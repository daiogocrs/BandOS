version: '3.8'

services:
  db:
    image: postgres:15
    container_name: bandos_db
    restart: always
    environment:
      POSTGRES_USER: bandos_user
      POSTGRES_PASSWORD: bandos_password
      POSTGRES_DB: bandos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: